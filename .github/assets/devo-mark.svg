  <defs>
    <path
      id="orbit"
      d="M64 17.5C78.5 25.2 86.2 40.8 82.6 56.8C67.4 57.6 54.3 49.9 48.8 36.1C51.9 26.7 57.2 20.4 64 17.5Z"
    />
  </defs>
  <g fill="none" stroke="#f8f5ef" stroke-linecap="round" stroke-linejoin="round" stroke-width="6">
    <use href="#orbit" />
    <use href="#orbit" transform="rotate(60 64 64)" />
    <use href="#orbit" transform="rotate(120 64 64)" />
    <use href="#orbit" transform="rotate(180 64 64)" />
    <use href="#orbit" transform="rotate(240 64 64)" />
    <use href="#orbit" transform="rotate(300 64 64)" />
  </g>
  <circle cx="64" cy="64" r="9.5" fill="#60A5FA" />
</svg>
