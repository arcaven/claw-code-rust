name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Matrix build ─────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        if: runner.os == 'Linux'

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: runner.os == 'Linux'
        with:
          tool: cargo-zigbuild@0.22.3

      - name: Build release binary (x86_64 Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p devo-cli

      - name: Build release binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p devo-cli

      - name: Build release binary (macOS)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }} -p devo-cli

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} -p devo-cli

      - name: Strip symbols (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/devo${{ matrix.ext }}

      - name: Prepare staging directory
        shell: bash
        run: |
          staging=devo-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p "$staging"
          cp target/${{ matrix.target }}/release/devo${{ matrix.ext }} "$staging/"
          cp README.md LICENSE "$staging/" 2>/dev/null || true
          echo "STAGING=$staging" >> "$GITHUB_ENV"

      - name: Create tar.gz archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: tar czf "${{ env.STAGING }}.tar.gz" "${{ env.STAGING }}"

      - name: Create zip archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "$env:STAGING"
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: devo-${{ github.ref_name }}-${{ matrix.target }}
          path: devo-${{ github.ref_name }}-${{ matrix.target }}.*

  # ── Desktop app builds ───────────────────────────────────────────────────
  desktop:
    name: Build desktop ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            script: package:mac
          - os: windows-latest
            platform: windows
            script: package:win
          - os: ubuntu-latest
            platform: linux
            script: package:linux

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.platform }}

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Build desktop package
        working-directory: apps/desktop
        run: bun run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: devo-desktop-${{ github.ref_name }}-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.blockmap
            apps/desktop/release/*.deb
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
            apps/desktop/release/*.rpm
            apps/desktop/release/*.yml
            apps/desktop/release/*.zip

  # ── Create GitHub Release ──────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build, desktop]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Generate release notes
        run: |
          cat > release-notes.md <<'NOTES'
          ## Install

          ### Linux / macOS

          ```bash
          curl -fsSL https://raw.githubusercontent.com/7df-lab/devo/main/install.sh | sh
          ```

          ### Windows

          ```powershell
          irm 'https://raw.githubusercontent.com/7df-lab/devo/main/install.ps1' | iex
          ```
          ---
          NOTES

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: true
          files: artifacts/*
          generate_release_notes: true
